name: Verify Secrets

# One-shot plumbing check: hits TikTok /advertiser/info/ with the configured
# access token, then echoes a success ping to Telegram. A single green run
# confirms all 7 secrets (TIKTOK_* + TELEGRAM_*) are wired correctly
# end-to-end.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-secrets.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TIKTOK_APP_ID: ${{ secrets.TIKTOK_APP_ID }}
      TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      TIKTOK_ADVERTISER_ID: ${{ secrets.TIKTOK_ADVERTISER_ID }}
      TIKTOK_SANDBOX: ${{ secrets.TIKTOK_SANDBOX }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Probe TikTok token
        run: tiktok-ads health

      - name: Ping Telegram
        run: tiktok-ads notify "verify-secrets ✓ passed — TikTok API reachable, Telegram wired. Run ${{ github.run_id }}."

      - name: Notify on failure
        if: failure()
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          topic_id = os.environ.get("TELEGRAM_TOPIC_ID", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          server_url = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"

          text = f"verify-secrets ✗ FAILED — run {run_id}. Check logs: {run_url}"
          body = {"chat_id": chat_id, "text": text}
          if topic_id:
              body["message_thread_id"] = int(topic_id)

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=json.dumps(body).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=15) as resp:  # noqa: S310
              print(resp.status, resp.read()[:200])
          PY
