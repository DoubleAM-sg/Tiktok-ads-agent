name: Daily TikTok Ads Report

# Runs every day at 05:00 SGT (21:00 UTC previous day) — shifted early
# to absorb GitHub Actions queue delays. Pulls yesterday's per-ad
# metrics, commits the snapshot under .state/daily_snapshots/, and
# posts a summary to Telegram. No auto-pause on daily data.
#
# Retrigger log:
#   - bump 1: first live run after pipeline scaffold merged
#   - bump 2: scheduled 2026-04-21 21:00 UTC cron did not produce a
#     snapshot on main; retriggering to fetch 2026-04-21 data and
#     surface any failure signal via the notify step
#   - bump 3: rerun for 2026-04-21 data with the new Meta-style
#     layout + signals block (PR #19)
#   - bump 4: refresh ad metadata + adopt creative_registry labels
#     (PR #21) so the Telegram post uses user-assigned short names
#     instead of the caption TikTok stores as ad_name
#   - bump 5: widen /ad/get/ filter to STATUS_ALL; Ads Manager UI
#     showed 3 ads (Who is PMAL / Cashback Launch / PMAL UGC) that
#     the default STATUS_NOT_DELETE filter was hiding. Refresh
#     roster so snapshot matches UI.
#   - bump 6: remap registry so POV + Bank-rejected ad_ids both
#     label as PMAL UGC (matches user's mental model: 6 UGC conv,
#     1 Cashback Launch conv); show ad_id tail in Ad Performance
#     rows so the two UGC variants stay distinguishable.
#   - bump 7: Ad Performance now aggregates by label (ad level)
#     rather than per ACO variant, with a separate Creative
#     Variants section that surfaces only when a label has >1
#     delivering variant. Matches the ad-level view in the UI.
#   - bump 8: pass filtering.ad_ids into /report/integrated/get/
#     so deleted ads retain their historical metrics. Current
#     snapshot lost POV's 3 conversions from 2026-04-21 the
#     moment POV was deleted; re-pull with the filter restores
#     the full 7-conversion day.
#   - bump 9: filtering.ad_ids alone wasn't enough (TikTok still
#     drops deleted ads from /report/integrated/get/). Merge
#     prior on-disk snapshot rows into new fetches so historical
#     metrics persist across ad deletions; bootstrap POV's 3
#     conversions back from commit 85d673c.
#   - bump 10: drop Telegram HTML parse_mode — signals block's
#     literal ``<3d)`` was being parsed as a malformed HTML tag
#     and returning 400 Bad Request.
#   - bump 11: clear creative_registry. Old caption-named ads
#     were Spark Ads (name defaulted to organic post caption);
#     new ads created in Ads Manager have proper short names. Let
#     /ad/get/ be the single source of truth for ad names; the
#     registry remains available as an optional manual override
#     but is no longer pre-populated with caption → label
#     mappings that don't exist in TikTok's data.
#   - bump 12: user confirmed token scope will keep us on the
#     Spark-Ad shadow copies for the foreseeable future, so
#     repopulate the registry mapping each shadow ad_id to the
#     short label they manage in Ads Manager. Also drops the
#     Signals section — thresholds are too noisy / unactionable
#     for a young account.
#   - bump 4: refresh ad metadata — user reports legacy caption-named
#     ads no longer in Ads Manager; confirm via fresh /ad/get/ pull

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily-report.yml"

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TIKTOK_APP_ID: ${{ secrets.TIKTOK_APP_ID }}
      TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      TIKTOK_ADVERTISER_ID: ${{ secrets.TIKTOK_ADVERTISER_ID }}
      TIKTOK_SANDBOX: ${{ secrets.TIKTOK_SANDBOX }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Initialise state directory
        run: tiktok-ads state init

      - name: Token health
        id: health
        run: |
          OUTPUT=$(tiktok-ads health 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "expired"; then
            tiktok-ads notify "Daily report SKIPPED: token expired. Renew TIKTOK_ACCESS_TOKEN."
            echo "status=expired" >> "$GITHUB_OUTPUT"
          else
            echo "status=healthy" >> "$GITHUB_OUTPUT"
          fi

      - name: Run daily report
        if: steps.health.outputs.status != 'expired'
        run: tiktok-ads report daily

      - name: Persist state to repo
        if: always()
        run: |
          git config user.name "tiktok-ads-bot"
          git config user.email "tiktok-ads-bot@github-actions"
          git add .state/ || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "state: daily report $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push origin main
          fi

      - name: Notify on failure
        if: failure()
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          topic_id = os.environ.get("TELEGRAM_TOPIC_ID", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "?")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          body = {
              "chat_id": chat_id,
              "text": (
                  f"Daily report ✗ FAILED — run {run_id}. "
                  f"Logs: {server}/{repo}/actions/runs/{run_id}"
              ),
          }
          if topic_id:
              body["message_thread_id"] = int(topic_id)
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=json.dumps(body).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=15) as resp:  # noqa: S310
              print(resp.status, resp.read()[:200])
          PY
