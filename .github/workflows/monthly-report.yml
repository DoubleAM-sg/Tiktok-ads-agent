name: Monthly TikTok Ads Report

# Runs on the 1st of each month at 05:00 SGT (1st 21:00 UTC = 2nd 05:00 SGT
# after the UTC→SGT shift — close enough; matches Meta agent cadence).
# Pulls the previous calendar month's metrics, diffs against the prior
# month if available, and commits + posts.

on:
  schedule:
    # Primary: 1st 21:00 UTC (2nd 05:00 SGT). Backup: 1st 21:20 UTC
    # (2nd 05:20 SGT) — GH Actions silently drops crons during peak
    # load, so the backup covers skips. Guard step below short-circuits
    # the backup when the primary already wrote the monthly snapshot.
    - cron: "0 21 1 * *"
    - cron: "20 21 1 * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/monthly-report.yml"

permissions:
  contents: write

jobs:
  monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TIKTOK_APP_ID: ${{ secrets.TIKTOK_APP_ID }}
      TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      TIKTOK_ADVERTISER_ID: ${{ secrets.TIKTOK_ADVERTISER_ID }}
      TIKTOK_SANDBOX: ${{ secrets.TIKTOK_SANDBOX }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check if snapshot already exists
        id: guard
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          sgt = ZoneInfo("Asia/Singapore")
          today = datetime.now(sgt).date()
          if today.month == 1:
              year, month = today.year - 1, 12
          else:
              year, month = today.year, today.month - 1
          target = f"{year:04d}-{month:02d}"
          path = Path(".state/monthly_snapshots") / f"{target}.json"
          exists = path.exists()
          print(f"target={target} path={path} exists={exists}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"already_ran={'true' if exists else 'false'}\n")
              fh.write(f"target={target}\n")
          PY

      - name: No-op (snapshot already committed)
        if: steps.guard.outputs.already_ran == 'true'
        run: |
          echo "Monthly snapshot for ${{ steps.guard.outputs.target }} is already on main."
          echo "Primary cron beat us to it — backup run exiting clean."

      - name: Install package
        if: steps.guard.outputs.already_ran != 'true'
        run: pip install -e .

      - name: Initialise state directory
        if: steps.guard.outputs.already_ran != 'true'
        run: tiktok-ads state init

      - name: Token health
        id: health
        if: steps.guard.outputs.already_ran != 'true'
        run: |
          OUTPUT=$(tiktok-ads health 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "expired"; then
            tiktok-ads notify "Monthly report SKIPPED: token expired. Renew TIKTOK_ACCESS_TOKEN."
            echo "status=expired" >> "$GITHUB_OUTPUT"
          else
            echo "status=healthy" >> "$GITHUB_OUTPUT"
          fi

      - name: Run monthly report
        if: steps.guard.outputs.already_ran != 'true' && steps.health.outputs.status != 'expired'
        run: tiktok-ads report monthly

      - name: Persist state to repo
        if: always() && steps.guard.outputs.already_ran != 'true'
        run: |
          git config user.name "tiktok-ads-bot"
          git config user.email "tiktok-ads-bot@github-actions"
          git add .state/ || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "state: monthly report $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push origin main
          fi

      - name: Notify on failure
        if: failure() && steps.guard.outputs.already_ran != 'true'
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          topic_id = os.environ.get("TELEGRAM_TOPIC_ID", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "?")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          body = {
              "chat_id": chat_id,
              "text": (
                  f"Monthly report ✗ FAILED — run {run_id}. "
                  f"Logs: {server}/{repo}/actions/runs/{run_id}"
              ),
          }
          if topic_id:
              body["message_thread_id"] = int(topic_id)
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=json.dumps(body).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=15) as resp:  # noqa: S310
              print(resp.status, resp.read()[:200])
          PY
